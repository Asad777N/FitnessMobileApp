<ion-header [translucent]="true" class="auth-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/auth/login"></ion-back-button>
    </ion-buttons>
    <ion-title>Create Account</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="auth-content">
  <div class="auth-container">
    <div class="brand">
      <h2>Join FitLife</h2>
      <p>Start your fitness journey today</p>
    </div>

    <form [formGroup]="registerForm" class="auth-form">
      <ion-item class="custom-input">
        <ion-label position="floating">Full Name</ion-label>
        <ion-input type="text" formControlName="displayName"></ion-input>
      </ion-item>

      <ion-item class="custom-input">
        <ion-label position="floating">Email</ion-label>
        <ion-input type="email" formControlName="email"></ion-input>
      </ion-item>

      <ion-item class="custom-input">
        <ion-label position="floating">Password</ion-label>
        <ion-input [type]="showPassword() ? 'text' : 'password'" formControlName="password"></ion-input>
        <ion-button slot="end" fill="clear" (click)="showPassword.set(!showPassword())">
          <ion-icon [name]="showPassword() ? 'eye-off' : 'eye'"></ion-icon>
        </ion-button>
      </ion-item>

      <ion-item class="custom-input">
        <ion-label position="floating">Confirm Password</ion-label>
        <ion-input type="password" formControlName="confirmPassword"></ion-input>
      </ion-item>

      <ion-button expand="block" class="btn-primary" (click)="registerWithEmail()" [disabled]="!registerForm.valid || isLoading()">
        <span *ngIf="!isLoading()">Create Account</span>
        <ion-spinner *ngIf="isLoading()" name="crescent"></ion-spinner>
      </ion-button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a (click)="navigateToLogin()">Sign In</a></p>
    </div>
  </div>
</ion-content>
