<ion-card class="exercise-card">
  <ion-card-header>
    <div class="exercise-header">
      <h2 class="exercise-number">{{ index + 1 }}</h2>
      <div>
        <ion-card-title>{{ exercise.name }}</ion-card-title>
        <ion-card-subtitle>{{ exercise.muscleGroups.join(', ') }}</ion-card-subtitle>
      </div>
    </div>
  </ion-card-header>
  <ion-card-content>
    <p class="description">{{ exercise.description }}</p>
    <div class="exercise-stats">
      <div class="stat">
        <span class="label">Sets</span>
        <span class="value">{{ exercise.sets }}</span>
      </div>
      <div class="stat">
        <span class="label">Reps</span>
        <span class="value">{{ exercise.reps }}</span>
      </div>
      <div class="stat">
        <span class="label">Rest</span>
        <span class="value">{{ exercise.restSeconds }}s</span>
      </div>
    </div>
    <div class="instructions" *ngIf="exercise.instructions.length > 0">
      <h4>Instructions:</h4>
      <ol>
        <li *ngFor="let instruction of exercise.instructions">{{ instruction }}</li>
      </ol>
    </div>
  </ion-card-content>
</ion-card>
